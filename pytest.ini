[pytest]
testpaths =
    tests/api
    tests/db
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --tb=short
markers =
    api: API automation tests
    db: database assertion tests
    smoke: critical smoke tests
    regression: regression test suite
    negative: negative test cases (auth failures, 404s)
    destructive: write operations that create/update/delete resources
